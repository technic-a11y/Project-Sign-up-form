<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
    <section class="container">
        <div class="logo-bar">
            <img src="odin-lined.png" alt="logo" class="logo">
            <span>ODIN</span>
        </div>
        <p class="photo-credit"><a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"></a>Photo by <a href="https://halie-west.com">Halie West</a> on <a href="https://unsplash.com/photos/25xggax4bSA">Unsplash</a></p>
    </section>
    <section class="right-container">
        <div class="text">
            <p>This is not a real online service! You know you need something like this in your life to help you realize
                your deepest dreams. Sign-Up <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>
        </div>
            <div class="form-head">
                <h1>Let's Do This!</h1>
                
                <form class="fields" action="#" method="post">
                    <div class="field">
                    <label for="first-name">First Name</label>
                    <input type="text" name="first-name" id="first-name" required/>
                    </div>
                    <div class="field">
                        <label for="last-name">Last Name</label>
                        <input type="text" name="last-name" id="last-name" required/>
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required/>
                    </div>
                    <div class="field">
                        <label for="phone-number">Phone Number</label>
                        <input type="tel" name="phone-number" id="phone-number" />
                    </div>
                    <div class="field">
                        <label for="pwd">Password</label>
                        <input type="password" name="password" id="pwd"required/>
                    </div>
                    <div class="field">
                        <label for="pwd">Confirm Password</label>
                        <input type="password" name="Confirm-password" id="pwd" required />
                    </div>
                </form>
            </div>
            <div class="bottom-area">
                    <button type="submit">Create Account</button>
                    <p>Already Have an Account? <a href="#">Log In</a></p>
                </div>
    </section>
    </div>
</body>
</html>
